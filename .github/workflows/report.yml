name: Dashboard

on:
  workflow_run:
    workflows: ["Trading cycle"]
    types: [completed]
  schedule:
    - cron: '45 */2 * * *'
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore DB state
        run: |
          git fetch origin paper-state 2>/dev/null || true
          git checkout origin/paper-state -- data/state.db 2>/dev/null || echo "No DB yet"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate dashboard
        run: node src/reports/dashboard.js

      - name: Publish to main/docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: dashboard update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main
