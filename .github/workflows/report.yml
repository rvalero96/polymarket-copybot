name: Dashboard

on:
  workflow_run:
    workflows: ["Trading cycle"]
    types: [completed]
  schedule:
    - cron: '45 */2 * * *'
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore DB state
        run: |
          git fetch origin paper-state 2>/dev/null || true
          git checkout origin/paper-state -- data/state.db 2>/dev/null || echo "No DB yet"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Backfill event slugs
        run: node scripts/backfill-slugs.js

      - name: Generate dashboard
        run: node src/reports/dashboard.js

      - name: Publish to main/docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: dashboard update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main

      - name: Persist updated slugs to paper-state
        run: |
          git fetch origin paper-state 2>/dev/null || true
          git checkout -B paper-state origin/paper-state 2>/dev/null || git checkout -b paper-state
          git add -f data/state.db
          git diff --cached --quiet || git commit -m "chore: backfill slugs $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin paper-state
