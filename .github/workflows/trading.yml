name: Trading cycle

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore DB state
        run: |
          git fetch origin paper-state 2>/dev/null || true
          git checkout origin/paper-state -- data/state.db 2>/dev/null || echo "No DB yet"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run trading cycle
        env:
          TRADING_MODE: paper
          LOG_LEVEL: info
        run: node src/engine/simulator.js

      - name: Persist DB state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout paper-state 2>/dev/null || git checkout -b paper-state
          git add data/state.db
          git diff --cached --quiet || git commit -m "chore: state snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin paper-state
