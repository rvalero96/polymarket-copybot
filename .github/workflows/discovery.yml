name: Discovery cycle

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore DB state
        run: |
          git fetch origin paper-state 2>/dev/null || true
          git checkout origin/paper-state -- data/state.db 2>/dev/null || echo "No DB yet"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run discovery
        env:
          LOG_LEVEL: info
        run: node src/discovery/ranker.js

      - name: Persist DB state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout paper-state 2>/dev/null || git checkout -b paper-state
          git add data/state.db
          git diff --cached --quiet || git commit -m "chore: roster update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin paper-state
