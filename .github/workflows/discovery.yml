name: Discovery cycle

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Debug sqlite
        run: |
          node --input-type=module << 'JSEOF'
          import { createRequire } from 'module';
          const require = createRequire(import.meta.url);
          const db = require('better-sqlite3');
          console.log('type:', typeof db);
          console.log('keys:', Object.keys(db));
          JSEOF

      - name: Run discovery
        env:
          LOG_LEVEL: info
        run: node src/discovery/ranker.js

      - name: Persist DB state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout paper-state 2>/dev/null || git checkout -b paper-state
          git add -f data/state.db
          git diff --cached --quiet || git commit -m "chore: roster update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin paper-state
