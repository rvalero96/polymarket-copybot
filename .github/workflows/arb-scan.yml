name: Arbitrage Scanner

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  arb-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore DB state
        run: |
          git fetch origin paper-state 2>/dev/null || true
          git checkout origin/paper-state -- data/state.db 2>/dev/null || echo "No DB yet"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run arbitrage scanner & executor
        env:
          TRADING_MODE: paper
          LOG_LEVEL: info
        run: node src/arbitrage/executor.js

      - name: Persist DB state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin paper-state 2>/dev/null || true
          git checkout -B paper-state origin/paper-state 2>/dev/null || git checkout -b paper-state
          git add -f data/state.db
          git diff --cached --quiet || git commit -m "chore: arb snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin paper-state
